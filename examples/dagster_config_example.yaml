# Dagster 爬虫配置示例文件
# 使用方法：dagster job execute -j crawl_hs_reports_job -m src.processing.compute.dagster -c examples/dagster_config_example.yaml
#
# 公司列表从数据库读取（需先运行 get_hs_companies_job 更新）

ops:
  crawl_hs_reports_op:
    config:
      # 年份（必需）
      year: 2024

      # 输出根目录（可选，默认 downloads/）
      output_root: "./downloads"

      # 并行进程数（可选，默认 4）
      workers: 4

      # 限制公司数量（可选，用于测试）
      # limit: 10

      # 指定股票代码列表（可选，仅爬取指定代码）
      # stock_codes: ["000001", "000002"]
